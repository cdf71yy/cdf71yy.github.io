<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練習ベアー</title>
    <style>
        body {
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 30px;
            border-radius: 10px;
            background-color: #8a6242;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 90%;          /* ✨スマホなど画面が小さい時は、画面幅の90%に自動で縮む */
            max-width: 500px;    /* ✨パソコンなどの大きな画面では、最大500pxまでしか広がらない */
            height: auto;
        }
        h1 { color: #f9e2af; } /* あなたが決めた黄色！ */

        /* --- ここから追加：ボタンのCSS --- */
        #get-num-btn {
            background-color: #313244; /* 背景と同じ色 */
            color: #f9e2af; /* あなたが決めた黄色！ */
            border: 2px solid #f9e2af; /* 黄色の枠線 */
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease; /* 動きをなめらかに */
            margin-top: 15px;
            display: block; /* 真ん中に寄せる */
            margin-left: auto;
            margin-right: auto;
        }
        #get-num-btn:hover {
            background-color: #f9e2af; /* ホバーしたら黄色くなる */
            color: #313244; /* 文字色は背景色に */
        }
        #result-area {
    font-size: 28px;
    font-weight: bold;
    color: #f5c2e7;
    margin-top: 25px;
    height: auto; /* 縦幅を自動で広がるようにする */
    
    /* 🌟ここから下の2行を追加！ */
    white-space: pre-wrap;  /* ✨さっきJSで書いた「\n（改行）」を画面に正しく反映させる命令 */
    text-align: center;     /* ✨文字を完全に中央に集める命令 */
}
    </style>
</head>
<body>
    <div class="card">
        <h1>レアカブトムシ</h1>
        <p>飛ぶ</p>
        
        <button id="get-num-btn">樹皮をめくる</button>
        <div id="counter-area">回数：0回</div>
        <div id="result-area"></div>
        </div>

    <script>
        // 1. 画面上のボタンと結果表示エリアを、プログラムが触れるように捕まえる
        const beetles = ["カブトムシ", "ヘラクレス", "コーカサス", "ゾウカブト", "オウゴンオニ"];
        const ranks = ["【C】だめかも", "【B】並個体", "【A】良個体", "【S】超レア", "【SS】幻", "【SSS】神話"];
        const button = document.getElementById('get-num-btn');
        const resultArea = document.getElementById('result-area');
        const counterArea = document.getElementById('counter-area');
        let clickCount = 0; // 最初は0回からスタート。後から増えるので let を使います

        // 2. ボタンをクリックしたときの「イベント」を設定する
        button.addEventListener('click', () => {
            clickCount = clickCount + 1; // 今の回数に1を足して記憶し直す
    counterArea.textContent = "回数：" + clickCount + "回";
            // 3. 1〜100のランダムな整数を計算する（プログラミング！）
            // Math.random()は0以上1未満のランダムな数（例：0.456...）を出す
            // それを100倍して1足し、Math.floorで小数を切り捨てる
            const randomIndex = Math.floor(Math.random() * beetles.length);
            // 🎲 1. 1〜100のサイコロを振る
const dice = Math.floor(Math.random() * 100) + 1;

// 🏆 2. 空っぽの「当選ランク」の箱を用意する
let selectedRank = "";

// 🧠 3. サイコロの目に応じてランクを決定する（条件分岐）
if (dice <= 1) {
    selectedRank = "【SSS】神話級 (1%)"; // 1%の確率
} else if (dice <= 5) {
    selectedRank = "【SS】幻の個体 (4%)";  // 2〜5が出たら（4%の確率）
} else if (dice <= 15) {
    selectedRank = "【S】超優良個体 (10%)";   // 6〜15が出たら（10%の確率）
} else if (dice <= 35) {
    selectedRank = "【A】優良個体 (20%)";  // 16〜35が出たら（20%の確率）
} else if (dice <= 65) {
    selectedRank = "【B】良個体 (30%)";   // 36〜65が出たら（30%の確率）
} else {
    selectedRank = "【C】並個体 (35%)";   // それ以外（66〜100）ならこれ
}

// 📺 4. 決まったランクと、カブトムシを合体させて画面に出す
resultArea.textContent = selectedRank + "\n" + beetles[randomIndex];
        });
    </script>
    </body>
</html>
