<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習ベアー</title>
    <style>
        body {
            background-color: #1e1e2e;
            color: #f9e2af;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 30px;
            border-radius: 10px;
            background-color: #313244;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { color: #f5c2e7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello, World!</h1>
        <p>ここは私だけの新しい隠れ家（ウェブサイト）です。</p>
        <p>焦らず、のんびり、自分のペースでアップデートしていきます。</p>
        <p>一行追加</p>
        <p>二行目追加</p>
    </div>
</body>
</html>
